<div class="overlay">
	<div class="popup">
        <h2>{{taskData.title}}</h2>
        <hr>
		<a class="close" href="#" (click)="onCloseDetails()">&times;</a>
		<div class="content">
			<section class="container">
                
                <h3>Description</h3>
                <p>
                    {{ taskData.description }}
                </p>
                <div style="display: flex; margin-top: 20px;">
                    <div style="width: 50%;">
                        <strong>Assigned To: </strong>
                        {{ taskData.assignTo }}
                    </div>
                    <div style="width: 50%;">
                        <strong>Created At: </strong>
                        {{ taskData.createdAt }}
                    </div>
                </div>
                <div style="display: flex; margin-top: 20px;">
                    <div style="width: 50%;">
                        <strong>Priority: </strong>
                        {{ taskData.priority }}
                    </div>
                    <div style="width: 50%;">
                        <strong>Current Status: </strong>
                        {{ taskData.status }}
                    </div>
                </div>
            </section>
		</div>
	</div>
</div>
