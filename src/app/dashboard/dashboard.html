@if (showCreateTaskForm) {
    <app-create-task 
        (CloseForm)="CloseCreateTaskForm()"
        (EmitTaskData)="CreateTask($event)"
    ></app-create-task>
}
<div class="dashboard-container">
    <div style="display: flex;">
        <div style="width: 50%">
            <h2>Dashboard</h2>
        </div>
        <div style="width: 50%; text-align: right;">
            <button class="create-task-btn" (click)="OpenCreateTaskForm()">Create Task</button>
            <button class="create-task-btn">Fetch Tasks</button>
            <button class="create-task-btn">Clear Tasks</button>
        </div>
    </div>

    <hr>


        
<div class="dashboard-item-container">
    
  @for (task of allTasks;  track task.id) {
    <div class="task-item task-open">
      <div class="task-title">
        <h3>{{ task.title }}</h3>
      </div>
      <p><b>Assigned to: </b>{{ task.assignTo }}</p>
      <p><b>Priority: </b>{{ task.priority }}</p>
      <p><b>Status: </b>{{ task.status }}</p>
      <div class="task-action-icons">
        <button class="task-action-btn" title="Detail">
          <i class="fa fa-info-circle" aria-hidden="true"></i>
        </button>
        <button class="task-action-btn" title="Edit">
          <i class="fa fa-pencil-square-o" aria-hidden="true"></i>
        </button>
        <button class="task-action-btn" title="Delete">
          <i class="fa fa-trash" aria-hidden="true"></i>
        </button>      
      </div>
    </div>
  } @empty {
    <div class="no-tasks">No tasks available</div>
  }
</div>
</div>
